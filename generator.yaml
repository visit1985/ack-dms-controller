ignore:
  field_paths:
    # We ignore CertificateWallet and provide a custom field in the Spec
    - ImportCertificateInput.CertificateWallet
    # We ignore the following fields because they bloat the Status object
    # and contain information from other ACK resources which can be
    # obtained directly.
    - ReplicationInstance.VpcSecurityGroups
    - ReplicationInstance.ReplicationSubnetGroup
  resource_names:
#    - Certificate
    - DataMigration
    - DataProvider
#    - Endpoint
#    - EventSubscription
    - FleetAdvisorCollector
    - InstanceProfile
    - MigrationProject
    - ReplicationConfig
#    - ReplicationInstance
#    - ReplicationSubnetGroup
#    - ReplicationTask
operations:
  ImportCertificate:
    resource_name: Certificate
    operation_type: CREATE
  ModifyReplicationInstance:
    override_values:
      # The whole concept of a "maintenance window" isn't aligned with the
      # declarative state model in Kubernetes. Users should build "maintenance
      # window" functionality at a higher layer than the APIs that manage the
      # lifecycle of individual resources like a replication instance. For
      # example, users can build maintenance window functionality into their
      # deployment pipeline solution or GitOps solution.
      #
      # We override the value of the ApplyImmediately field in the modify
      # operations to "true" because we want changes that a Kubernetes user
      # makes to a resource's Spec to be reconciled by the ACK service
      # controller, not a different service.
      ApplyImmediately: true
      # We override the value of AllowMajorVersionUpgrade field in the modify
      # call since any engine version change should apply directly.
      # This flag was designed as a protect flag but not necessary in controller
      # side when customer need to make the engine version change
      AllowMajorVersionUpgrade: true
resources:
  Certificate:
    exceptions:
      errors:
        404:
          code: ResourceNotFoundFault
    fields:
      CertificatePem:
        is_secret: true
      # We ignore this field from ImportCertificateInput and replace it with a
      # custom field in the Spec because []byte fields in combination with
      # is_secret are not properly handled by ACK code generator which causes
      # type casting errors in newCreateRequestPayload()
      CertificateWallet:
        is_secret: true
        type: "*string"
      KMSKeyID:
        is_immutable: true
        references:
          resource: Key
          service_name: kms
          path: Status.KeyID
      Name:
        is_primary_key: true
        is_immutable: true
      Tags:
        compare:
          is_ignored: true
    hooks:
      delta_pre_compare:
        code: compareTags(delta, a, b)
      sdk_create_post_build_request:
        template_path: hooks/certificate/sdk_create_post_build_request.go.tpl
      sdk_read_many_post_build_request:
        template_path: hooks/certificate/sdk_read_many_post_build_request.go.tpl
      sdk_read_many_post_set_output:
        template_path: hooks/certificate/sdk_read_many_post_set_output.go.tpl
    print:
      add_age_column: true
      add_synced_column: true
    renames:
      operations:
        ImportCertificate:
          input_fields:
            CertificateIdentifier: Name
    # DMS does not provide a ModifyCertificate API, so we have to use a custom
    # method to update Tags.
    update_operation:
      custom_method_name: customSdkUpdate
