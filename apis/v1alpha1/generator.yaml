ignore:
  resource_names:
    - DataMigration
    - DataProvider
#    - Endpoint
    - EventSubscription
    - FleetAdvisorCollector
    - InstanceProfile
    - MigrationProject
    - ReplicationConfig
    - ReplicationInstance
    - ReplicationSubnetGroup
#    - ReplicationTask
resources:
  Endpoint:
    fields:
      EndpointStatus:
        print:
          name: STATUS
      Name:
        is_primary_key: true
        is_immutable: true
      OracleSettings.ExtraArchivedLogDestIDs:
        compare:
          is_ignored: true
      ResourceIdentifier:
        late_initialize: {}
      Tags:
        compare:
          is_ignored: true
    hooks:
      delta_pre_compare:
        code: customPreCompare(delta, a, b)
      sdk_read_many_post_build_request:
        template_path: hooks/endpoint/sdk_read_many_post_build_request.go.tpl
      sdk_read_many_post_request:
        template_path: hooks/endpoint/sdk_read_many_post_request.go.tpl
    renames:
      operations:
        CreateEndpoint:
          input_fields:
            EndpointIdentifier: Name
          output_fields:
            Status: EndpointStatus
        DescribeEndpoints:
          output_fields:
            Status: EndpointStatus
        ModifyEndpoint:
          output_fields:
            Status: EndpointStatus
  ReplicationTask:
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      TaskStatus:
        print:
          name: STATUS
      ResourceIdentifier:
        late_initialize: {}
      SourceEndpointARN:
        references:
            resource: Endpoint
            path: Status.ACKResourceMetadata.ARN
      StartReplicationTask:
        type: boolean
      Tags:
        compare:
          is_ignored: true
      TargetEndpointARN:
        references:
            resource: Endpoint
            path: Status.ACKResourceMetadata.ARN
    hooks:
      delta_pre_compare:
        code: compareTags(delta, a, b)
      sdk_create_pre_set_output:
        template_path: hooks/replication_task/sdk_create_pre_set_output.go.tpl
      sdk_read_many_post_build_request:
        template_path: hooks/replication_task/sdk_read_many_post_build_request.go.tpl
      sdk_read_many_post_request:
        template_path: hooks/replication_task/sdk_read_many_post_request.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/replication_task/sdk_update_pre_build_request.go.tpl
      sdk_update_pre_set_output:
        template_path: hooks/replication_task/sdk_update_pre_set_output.go.tpl
    reconcile:
      requeue_on_success_seconds: 60
    renames:
      operations:
        CreateReplicationTask:
          input_fields:
            ReplicationTaskIdentifier: Name
          output_fields:
            Status: TaskStatus
        DescribeReplicationTasks:
          output_fields:
            Status: TaskStatus
        ModifyReplicationTask:
          output_fields:
            Status: TaskStatus
sdk_names:
  model_name: database-migration-service
  package_name: databasemigrationservice
