---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: eventsubscriptions.dms.services.k8s.aws
spec:
  group: dms.services.k8s.aws
  names:
    kind: EventSubscription
    listKind: EventSubscriptionList
    plural: eventsubscriptions
    singular: eventsubscription
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.subscriptionStatus
      name: Status
      type: string
    - jsonPath: .status.conditions[?(@.type=="ACK.ResourceSynced")].status
      name: Synced
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EventSubscription is the Schema for the EventSubscriptions API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EventSubscriptionSpec defines the desired state of EventSubscription.

              Describes an event notification subscription created by the CreateEventSubscription
              operation.
            properties:
              enabled:
                description: |-
                  A Boolean value; set to true to activate the subscription, or set to false
                  to create the subscription but not activate it.
                type: boolean
              eventCategories:
                description: |-
                  A list of event categories for a source type that you want to subscribe to.
                  For more information, see Working with Events and Notifications (https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Events.html)
                  in the Database Migration Service User Guide.
                items:
                  type: string
                type: array
              name:
                description: |-
                  The name of the DMS event notification subscription. This name must be less
                  than 255 characters.
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              snsTopicARN:
                description: |-
                  The Amazon Resource Name (ARN) of the Amazon SNS topic created for event
                  notification. The ARN is created by Amazon SNS when you create a topic and
                  subscribe to it.
                type: string
              snsTopicRef:
                description: |-
                  Reference to an ACK managed Amazon SNS topic resource created for event
                  notification.
                properties:
                  from:
                    description: |-
                      AWSResourceReference provides all the values necessary to reference another
                      k8s resource for finding the identifier(Id/ARN/Name)
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    type: object
                type: object
              sourceIDs:
                description: |-
                  A list of identifiers for which DMS provides notification events.

                  If you don't specify a value, notifications are provided for all sources.

                  If you specify multiple values, they must be of the same type. For example,
                  if you specify a database instance ID, then all of the other values must
                  be database instance IDs.
                items:
                  type: string
                type: array
              sourceType:
                description: |-
                  The type of DMS resource that generates the events. For example, if you want
                  to be notified of events generated by a replication instance, you set this
                  parameter to replication-instance. If this value isn't specified, all events
                  are returned.

                  Valid values: replication-instance | replication-task
                type: string
              tags:
                description: One or more tags to be assigned to the event subscription.
                items:
                  description: |-
                    A user-defined key-value pair that describes metadata added to an DMS resource
                    and that is used by operations such as the following:

                       * AddTagsToResource

                       * ListTagsForResource

                       * RemoveTagsFromResource
                  properties:
                    key:
                      type: string
                    resourceARN:
                      type: string
                    value:
                      type: string
                  type: object
                type: array
            required:
            - name
            type: object
          status:
            description: EventSubscriptionStatus defines the observed state of EventSubscription
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              customerAccountID:
                description: |-
                  The Amazon Web Services customer account associated with the DMS event notification
                  subscription.
                type: string
              subscriptionCreationTime:
                description: The time the DMS event notification subscription was
                  created.
                type: string
              subscriptionStatus:
                description: |-
                  The status of the DMS event notification subscription.

                  Constraints:

                  Can be one of the following: creating | modifying | deleting | active | no-permission
                  | topic-not-exist

                  The status "no-permission" indicates that DMS no longer has permission to
                  post to the SNS topic. The status "topic-not-exist" indicates that the topic
                  was deleted after the subscription was created.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
